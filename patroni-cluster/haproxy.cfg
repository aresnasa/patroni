global
    maxconn 1000
    log stdout local0
    daemon

defaults
    mode tcp
    log global
    option dontlognull
    option tcp-check
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 1m
    timeout server 1m
    timeout check 5s

# HAProxy 统计页面
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node

# PostgreSQL 主库连接 (读写)
listen postgres_primary
    bind *:5000
    option httpchk
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres1 postgres1:5432 maxconn 100 check port 8008
    server postgres2 postgres2:5432 maxconn 100 check port 8009 backup
    server postgres3 postgres3:5432 maxconn 100 check port 8010 backup

# PostgreSQL 副本连接 (只读)
listen postgres_replicas
    bind *:5001
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres1 postgres1:5432 maxconn 100 check port 8008
    server postgres2 postgres2:5432 maxconn 100 check port 8009
    server postgres3 postgres3:5432 maxconn 100 check port 8010

# 所有节点连接 (用于管理)
listen postgres_all
    bind *:5002
    option httpchk
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres1 postgres1:5432 maxconn 100 check port 8008
    server postgres2 postgres2:5432 maxconn 100 check port 8009
    server postgres3 postgres3:5432 maxconn 100 check port 8010
