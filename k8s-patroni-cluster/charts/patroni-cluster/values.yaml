# Patroni PostgreSQL Cluster Configuration
global:
  storageClass: ""
  namespace: patroni-cluster

# Namespace Configuration
namespace:
  create: false  # Set to true if you want Helm to create the namespace

# PostgreSQL Configuration
postgresql:
  version: "15"
  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  
  # Database configuration
  database: postgres
  username: postgres
  password: postgres123
  replicationUsername: replicator
  replicationPassword: replicator123
  
  # Patroni configuration
  patroni:
    version: "latest"
    image:
      repository: ongres/patroni
      tag: "latest"
      pullPolicy: IfNotPresent
    
    # Cluster settings
    scope: postgres-cluster
    ttl: 30
    loopWait: 10
    retryTimeout: 30
    
    # PostgreSQL parameters
    parameters:
      max_connections: 200
      shared_buffers: 256MB
      effective_cache_size: 1GB
      maintenance_work_mem: 64MB
      checkpoint_completion_target: 0.9
      wal_buffers: 16MB
      default_statistics_target: 100
      random_page_cost: 1.1
      effective_io_concurrency: 200
      work_mem: 4MB
      min_wal_size: 1GB
      max_wal_size: 4GB
      max_worker_processes: 8
      max_parallel_workers_per_gather: 2
      max_parallel_workers: 8
      max_parallel_maintenance_workers: 2

  # Resource configuration
  resources:
    limits:
      cpu: 2
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  # Storage configuration
  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce
    annotations: {}

  # Service configuration
  service:
    type: ClusterIP
    port: 5432
    annotations: {}

# etcd Configuration
etcd:
  enabled: true
  image:
    repository: bitnami/etcd
    tag: "latest"
    pullPolicy: IfNotPresent
  
  replicas: 3
  
  # Resource configuration
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  
  # Storage configuration
  persistence:
    enabled: true
    size: 8Gi
    accessMode: ReadWriteOnce
    annotations: {}
  
  # Service configuration
  service:
    type: ClusterIP
    clientPort: 2379
    peerPort: 2380

# Load Balancer Configuration (using Kubernetes Services)
loadBalancer:
  enabled: true
  
  # Primary service (read-write, connects to leader only)
  primary:
    enabled: true
    type: LoadBalancer
    port: 5432
    annotations:
      # AWS Load Balancer annotations (uncomment for AWS)
      # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
      
      # GCP Load Balancer annotations (uncomment for GCP)
      # cloud.google.com/load-balancer-type: "External"
      
      # Azure Load Balancer annotations (uncomment for Azure)
      # service.beta.kubernetes.io/azure-load-balancer-internal: "false"
    
    # Health check configuration
    healthCheck:
      enabled: true
      path: "/primary"
      port: 8008
  
  # Read-only service (connects to replica pods only)
  readonly:
    enabled: true
    type: ClusterIP
    port: 5433
    annotations: {}
    
    # Health check configuration
    healthCheck:
      enabled: true
      path: "/replica"
      port: 8008
  
  # All nodes service (connects to any available pod)
  all:
    enabled: true
    type: ClusterIP
    port: 5434
    annotations: {}
    
    # No health check needed for this service

# Cluster Configuration
cluster:
  replicas: 3
  name: patroni-cluster

# Network Policy
networkPolicy:
  enabled: false

# Pod Security Policy
podSecurityPolicy:
  enabled: false

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 999

# Security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 999

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s

# Tests
tests:
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
