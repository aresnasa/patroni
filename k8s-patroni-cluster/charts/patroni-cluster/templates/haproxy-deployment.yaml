{{- if .Values.haproxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-haproxy
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: haproxy
spec:
  replicas: {{ .Values.haproxy.replicas }}
  selector:
    matchLabels:
      {{- include "patroni-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: haproxy
  template:
    metadata:
      labels:
        {{- include "patroni-cluster.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: haproxy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/haproxy-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "patroni-cluster.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: haproxy
        image: "{{ .Values.haproxy.image.repository }}:{{ .Values.haproxy.image.tag }}"
        imagePullPolicy: {{ .Values.haproxy.image.pullPolicy }}
        ports:
        - name: primary
          containerPort: {{ .Values.haproxy.service.ports.primary }}
          protocol: TCP
        - name: replica
          containerPort: {{ .Values.haproxy.service.ports.replica }}
          protocol: TCP
        - name: all
          containerPort: {{ .Values.haproxy.service.ports.all }}
          protocol: TCP
        - name: stats
          containerPort: {{ .Values.haproxy.service.ports.stats }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: {{ .Values.haproxy.config.stats.uri }}
            port: {{ .Values.haproxy.service.ports.stats }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: {{ .Values.haproxy.config.stats.uri }}
            port: {{ .Values.haproxy.service.ports.stats }}
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.haproxy.resources | nindent 10 }}
        volumeMounts:
        - name: haproxy-config
          mountPath: /usr/local/etc/haproxy/haproxy.cfg
          subPath: haproxy.cfg
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
      volumes:
      - name: haproxy-config
        configMap:
          name: {{ include "patroni-cluster.fullname" . }}-haproxy-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
