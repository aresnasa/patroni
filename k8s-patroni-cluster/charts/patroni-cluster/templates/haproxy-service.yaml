{{- if .Values.haproxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "patroni-cluster.fullname" . }}-haproxy
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: haproxy
  {{- with .Values.haproxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.haproxy.service.type }}
  ports:
  - port: {{ .Values.haproxy.service.ports.primary }}
    targetPort: primary
    protocol: TCP
    name: primary
  - port: {{ .Values.haproxy.service.ports.replica }}
    targetPort: replica
    protocol: TCP
    name: replica
  - port: {{ .Values.haproxy.service.ports.all }}
    targetPort: all
    protocol: TCP
    name: all
  - port: {{ .Values.haproxy.service.ports.stats }}
    targetPort: stats
    protocol: TCP
    name: stats
  selector:
    {{- include "patroni-cluster.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: haproxy
{{- end }}
