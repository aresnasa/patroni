apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "patroni-cluster.fullname" . }}-test"
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "patroni-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: postgres:16-alpine
    command:
    - /bin/sh
    - -c
    - |
      set -e
      echo "🧪 开始 Patroni 集群连接测试..."
      
      # Test 1: Check if PostgreSQL pods are running
      echo "Test 1: Checking PostgreSQL pods..."
      apk add --no-cache curl
      
      for i in 0 1 2; do
        pod_name="{{ include "patroni-cluster.fullname" . }}-postgresql-$i"
        echo "Checking $pod_name..."
        
        # Check Patroni API
        if curl -f -s "http://$pod_name.{{ include "patroni-cluster.fullname" . }}-postgresql-headless.{{ .Values.global.namespace }}.svc.cluster.local:8008/health" > /dev/null 2>&1; then
          echo "✅ $pod_name is healthy"
        else
          echo "❌ $pod_name is not responding"
        fi
      done
      
      # Test 2: Test database connectivity
      echo "Test 2: Testing database connectivity..."
      apk add --no-cache postgresql-client
      
      export PGPASSWORD='{{ .Values.postgresql.password }}'
      
      # Test connection to primary service
      if psql -h "{{ include "patroni-cluster.fullname" . }}-primary.{{ .Values.global.namespace }}.svc.cluster.local" -p {{ .Values.loadBalancer.primary.port }} -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} -c "SELECT version();" > /dev/null 2>&1; then
        echo "✅ Connection to primary service successful"
      else
        echo "❌ Connection to primary service failed"
        exit 1
      fi
      
      # Test connection to readonly service
      if psql -h "{{ include "patroni-cluster.fullname" . }}-readonly.{{ .Values.global.namespace }}.svc.cluster.local" -p {{ .Values.loadBalancer.readonly.port }} -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} -c "SELECT version();" > /dev/null 2>&1; then
        echo "✅ Connection to readonly service successful"
      else
        echo "❌ Connection to readonly service failed"
        exit 1
      fi
      
      # Test 3: Create test table and test read/write operations
      echo "Test 3: Testing read/write operations..."
      
      psql -h "{{ include "patroni-cluster.fullname" . }}-primary.{{ .Values.global.namespace }}.svc.cluster.local" -p {{ .Values.loadBalancer.primary.port }} -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} -c "
        CREATE TABLE IF NOT EXISTS test_table (
          id SERIAL PRIMARY KEY,
          data TEXT,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );
        INSERT INTO test_table (data) VALUES ('Test connection from Helm test');
      "
      
      # Test read from readonly service
      result=$(psql -h "{{ include "patroni-cluster.fullname" . }}-readonly.{{ .Values.global.namespace }}.svc.cluster.local" -p {{ .Values.loadBalancer.readonly.port }} -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} -t -c "SELECT COUNT(*) FROM test_table;")
      if [ "$(echo $result | tr -d ' ')" -ge "1" ]; then
        echo "✅ Read from readonly service successful"
      else
        echo "❌ Read from readonly service failed"
        exit 1
      fi
      
      # Cleanup
      psql -h "{{ include "patroni-cluster.fullname" . }}-primary.{{ .Values.global.namespace }}.svc.cluster.local" -p {{ .Values.loadBalancer.primary.port }} -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} -c "DROP TABLE test_table;"
      
      echo "🎉 所有测试通过！Patroni 集群运行正常"
