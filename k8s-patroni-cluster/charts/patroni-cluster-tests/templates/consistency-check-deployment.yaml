{{- if .Values.consistencyCheck.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "patroni-cluster-tests.fullname" . }}-consistency-check
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "patroni-cluster-tests.labels" . | nindent 4 }}
    app.kubernetes.io/component: consistency-check
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "patroni-cluster-tests.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: consistency-check
  template:
    metadata:
      labels:
        {{- include "patroni-cluster-tests.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: consistency-check
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "patroni-cluster-tests.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: consistency-check
        image: "{{ .Values.consistencyCheck.image.repository }}:{{ .Values.consistencyCheck.image.tag }}"
        imagePullPolicy: {{ .Values.consistencyCheck.image.pullPolicy }}
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache gcc musl-dev postgresql-dev
          pip install -r /scripts/requirements.txt
          python /scripts/consistency_check.py
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          {{- toYaml .Values.consistencyCheck.resources | nindent 10 }}
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
      volumes:
      - name: scripts
        configMap:
          name: {{ include "patroni-cluster-tests.fullname" . }}-consistency-check
          defaultMode: 0755
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
